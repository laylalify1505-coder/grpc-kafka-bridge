syntax = "proto3";

package subserver.dataplane.v1;

option java_multiple_files = true;

service DataPlane {
  rpc Subscribe(SubscribeRequest) returns (stream DataEnvelope);
}

message SubscribeRequest {
  int64 iot_id = 1;
}

message DataEnvelope {
  string correlation_id = 1;
  int64  iot_id         = 2;
  string data_type      = 3;
  string data           = 4;
}
