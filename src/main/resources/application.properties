spring.application.name=grpc-kafka-bridge

# ── Kafka ──────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# ── Bridge - gRPC ────────────────────────────────────────────────────────────
bridge.grpc.host=${SUB_SERVER_HOST:localhost}
bridge.grpc.port=${SUB_SERVER_PORT:50051}
bridge.grpc.iot-id=${IOT_ID:0}
bridge.grpc.reconnect-delay-ms=${RECONNECT_DELAY_MS:5000}

# ── Bridge - Kafka ───────────────────────────────────────────────────────────
bridge.kafka.topic=${KAFKA_TOPIC:subserver-data}
bridge.kafka.payload-type=${KAFKA_PAYLOAD_TYPE:subserver.data}
bridge.kafka.source=${KAFKA_SOURCE:grpc-kafka-bridge}
bridge.kafka.version=${KAFKA_VERSION:1.0}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.bridge=INFO
logging.level.io.grpc=WARN
